<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>

<header class="checkout-header">
  <div class="header-inner">
    <div class="brand">
      <a href="/NewBalanceShop/index.html">
        <img src="/NewBalanceShop/img/svg/footer/logo.svg" alt="NB Logo">
      </a>
      <span>Secure checkout</span>
    </div>
    <div class="cart">
      <a href="/NewBalanceShop/pages/cart.html">
        <img src="/NewBalanceShop/img/svg/header/cart.svg" alt="">
      </a>
    </div>
  </div>
</header>

<div class="checkout-wrapper">

  <div class="breadcrumbs">
    Shipping info <span>></span> Payment <span>></span> Review and buy
  </div>

  <div class="checkout-grid">

    <div class="checkout-main">

      <!-- Contact Section -->
      <section class="section contact-section">
        <h2>Contact</h2>
        <div class="row">
          <input id="email" type="email" placeholder="Email">
          <input id="phone" type="tel" placeholder="Phone number">
        </div>
        <label class="newsletter">
          <input type="checkbox"> Sign up for email to hear about product launches, exclusive offers and athlete news. By subscribing, I am agreeing to the New Balance <a href="#">Privacy Policy</a> and <a href="#">Terms & Conditions</a>.
        </label>
      </section>

      <section class="section shipping-section">
        <h2>Shipping address</h2>
        <div class="row">
          <input id="first-name" type="text" placeholder="First Name">
          <input id="last-name" type="text" placeholder="Last Name">
        </div>
        <input id="address" type="text" placeholder="Street Address">
      </section>

      <button class="continue-btn">Continue to Payment</button>

    </div>

    <!-- Summary Section -->
    <aside class="summary">
      <h2>Order Summary</h2>

      <p class="summary-row subtotal">
        <span>Subtotal</span>
        <span>$0.00</span>
      </p>

      <p class="summary-row shipping-price">
        <span>Shipping: Standard</span>
        <span>FREE</span>
      </p>

      <p class="summary-row">
        <span>Total Tax</span>
        <span>$0.00</span>
      </p>

      <p class="summary-row order-total">
        <span>Order Total</span>
        <span>$0.00</span>
      </p>
      <div class="checkout-products"></div>
    </aside>

  </div>
</div>

<template id="checkout-product-template">

  <div class="checkout-product">

    <img
      class="checkout-product-image"
      src=""
      alt=""
    >

    <div class="checkout-product-info">

      <h4 class="checkout-product-name"></h4>

      <p class="checkout-product-gender"></p>

      <p class="checkout-product-color"></p>

      <p class="checkout-product-size"></p>

      <p class="checkout-product-quantity"></p>

      <p class="checkout-product-price"></p>

    </div>

  </div>

</template>

<script type="module" src="../js/checkout.js"></script>
<script type="module" src="../js/app.js"></script>

</body>
</html>
